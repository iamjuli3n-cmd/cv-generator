<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer un CV</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { text-align: center; color: #333; }
    h2 { color: #555; border-bottom: 2px solid #ddd; padding-bottom: 6px; margin-top: 30px; }
    h3 { color: #666; margin-top: 16px; }
    input, textarea { width: 100%; padding: 8px; margin-top: 4px; margin-bottom: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    textarea { height: 80px; resize: vertical; }
    label { font-weight: bold; color: #444; }
    button { padding: 8px 16px; background: #4a90e2; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 6px; }
    button:hover { background: #357abd; }
    button.remove { background: #e24a4a; margin-left: 8px; }
    button.remove:hover { background: #bd3535; }
    .item-block { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
    #submit-btn { width: 100%; padding: 14px; font-size: 16px; margin-top: 30px; background: #27ae60; }
    #submit-btn:hover { background: #1e8449; }
    #response { margin-top: 20px; padding: 12px; border-radius: 4px; display: none; }
    #response.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    #response.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>

<h1>Créer un CV</h1>

<!-- INFOS GÉNÉRALES -->
<h2>Informations générales</h2>
<label>Titre du profil</label>
<input type="text" id="titre_profil" placeholder="Ex : Développeur Web Full-Stack">
<label>Résumé</label>
<textarea id="resume" placeholder="Décrivez votre profil en quelques lignes..."></textarea>

<!-- INFORMATIONS PERSONNELLES -->
<h2>Informations personnelles</h2>
<label>Nom</label>
<input type="text" id="name" placeholder="Dupont">
<label>Prénom</label>
<input type="text" id="first_name" placeholder="Thomas">
<label>Adresse</label>
<input type="text" id="address" placeholder="12 rue de la Paix, 75001 Paris">
<label>Téléphone</label>
<input type="text" id="phone_number" placeholder="+33 6 12 34 56 78">
<label>Email</label>
<input type="email" id="email" placeholder="thomas.dupont@gmail.com">
<label>LinkedIn</label>
<input type="url" id="linkedin" placeholder="https://linkedin.com/in/monprofil">
<label>GitHub</label>
<input type="url" id="github" placeholder="https://github.com/monutilisateur">
<label>Portfolio</label>
<input type="url" id="portfoliio" placeholder="https://monportfolio.com">

<!-- EXPÉRIENCES -->
<h2>Expériences professionnelles</h2>
<div id="experiences-container"></div>
<button onclick="addExperience()">+ Ajouter une expérience</button>

<!-- FORMATIONS -->
<h2>Formations</h2>
<div id="formations-container"></div>
<button onclick="addFormation()">+ Ajouter une formation</button>

<!-- PROJETS -->
<h2>Projets</h2>
<div id="projects-container"></div>
<button onclick="addProject()">+ Ajouter un projet</button>

<!-- LANGUES -->
<h2>Langues</h2>
<div id="languages-container"></div>
<button onclick="addLanguage()">+ Ajouter une langue</button>

<!-- ACTIVITÉS -->
<h2>Activités</h2>
<div id="activities-container"></div>
<button onclick="addActivity()">+ Ajouter une activité</button>

<!-- SUBMIT -->
<button id="submit-btn" onclick="submitCV()">Créer le CV</button>
<div id="response"></div>

<script>
  let expCount = 0, formCount = 0, projCount = 0, langCount = 0, actCount = 0;

  function addExperience() {
    const id = expCount++;
    const div = document.createElement('div');
    div.className = 'item-block';
    div.id = `exp-${id}`;
    div.innerHTML = `
      <h3>Expérience <button class="remove" onclick="remove('exp-${id}')">Supprimer</button></h3>
      <label>Poste</label><input type="text" id="exp-job-${id}" placeholder="Développeur Full-Stack">
      <label>Entreprise</label><input type="text" id="exp-company-${id}" placeholder="TechCorp">
      <label>Ville</label><input type="text" id="exp-city-${id}" placeholder="Paris">
      <label>Date de début</label><input type="date" id="exp-start-${id}">
      <label>Date de fin</label><input type="date" id="exp-end-${id}">
      <label>Missions (une par ligne)</label>
      <textarea id="exp-missions-${id}" placeholder="Développement API REST&#10;Intégration React&#10;Mise en place CI/CD"></textarea>
    `;
    document.getElementById('experiences-container').appendChild(div);
  }

  function addFormation() {
    const id = formCount++;
    const div = document.createElement('div');
    div.className = 'item-block';
    div.id = `form-${id}`;
    div.innerHTML = `
      <h3>Formation <button class="remove" onclick="remove('form-${id}')">Supprimer</button></h3>
      <label>Diplôme</label><input type="text" id="form-diploma-${id}" placeholder="Master Informatique">
      <label>École</label><input type="text" id="form-school-${id}" placeholder="Université Paris-Saclay">
      <label>Ville</label><input type="text" id="form-city-${id}" placeholder="Paris">
      <label>Période</label><input type="text" id="form-date-${id}" placeholder="2019-2021">
    `;
    document.getElementById('formations-container').appendChild(div);
  }

  function addProject() {
    const id = projCount++;
    const div = document.createElement('div');
    div.className = 'item-block';
    div.id = `proj-${id}`;
    div.innerHTML = `
      <h3>Projet <button class="remove" onclick="remove('proj-${id}')">Supprimer</button></h3>
      <label>Nom</label><input type="text" id="proj-name-${id}" placeholder="CV Generator">
      <label>Description</label><textarea id="proj-desc-${id}" placeholder="Description du projet..."></textarea>
      <label>Lien</label><input type="url" id="proj-link-${id}" placeholder="https://github.com/...">
      <label>Technologies (séparées par des virgules)</label>
      <input type="text" id="proj-tech-${id}" placeholder="FastAPI, React, PostgreSQL">
    `;
    document.getElementById('projects-container').appendChild(div);
  }

  function addLanguage() {
    const id = langCount++;
    const div = document.createElement('div');
    div.className = 'item-block';
    div.id = `lang-${id}`;
    div.innerHTML = `
      <h3>Langue <button class="remove" onclick="remove('lang-${id}')">Supprimer</button></h3>
      <label>Langue</label><input type="text" id="lang-name-${id}" placeholder="Anglais">
      <label>Niveau</label><input type="text" id="lang-level-${id}" placeholder="C1">
    `;
    document.getElementById('languages-container').appendChild(div);
  }

  function addActivity() {
    const id = actCount++;
    const div = document.createElement('div');
    div.className = 'item-block';
    div.id = `act-${id}`;
    div.innerHTML = `
      <h3>Activité <button class="remove" onclick="remove('act-${id}')">Supprimer</button></h3>
      <label>Organisation</label><input type="text" id="act-org-${id}" placeholder="BDE Université">
      <label>Rôle</label><input type="text" id="act-role-${id}" placeholder="Responsable communication">
      <label>Missions (une par ligne)</label>
      <textarea id="act-missions-${id}" placeholder="Gestion des réseaux sociaux&#10;Organisation d'événements"></textarea>
    `;
    document.getElementById('activities-container').appendChild(div);
  }

  function remove(id) {
    document.getElementById(id).remove();
  }

  function getFilledInputs(container, prefix, count) {
    const results = [];
    for (let i = 0; i < count; i++) {
      if (document.getElementById(`${prefix}-${i}`)) results.push(i);
    }
    return results;
  }

  function submitCV() {
    const expIds = getFilledInputs('experiences-container', 'exp', expCount);
    const formIds = getFilledInputs('formations-container', 'form', formCount);
    const projIds = getFilledInputs('projects-container', 'proj', projCount);
    const langIds = getFilledInputs('languages-container', 'lang', langCount);
    const actIds = getFilledInputs('activities-container', 'act', actCount);

    const cv = {
      titre_profil: document.getElementById('titre_profil').value,
      resume: document.getElementById('resume').value,

      personnal_information: {
        name: document.getElementById('name').value,
        first_name: document.getElementById('first_name').value,
        address: document.getElementById('address').value,
        phone_number: document.getElementById('phone_number').value,
        email: document.getElementById('email').value,
        linkedin: document.getElementById('linkedin').value || null,
        github: document.getElementById('github').value || null,
        portfoliio: document.getElementById('portfoliio').value || null,
      },

      experiences: expIds.map(i => ({
        job: document.getElementById(`exp-job-${i}`).value,
        company: document.getElementById(`exp-company-${i}`).value,
        city: document.getElementById(`exp-city-${i}`).value,
        start_date: document.getElementById(`exp-start-${i}`).value,
        end_date: document.getElementById(`exp-end-${i}`).value || null,
        missions: document.getElementById(`exp-missions-${i}`).value
          .split('\n').filter(m => m.trim())
          .map(m => ({ description: m.trim() }))
      })),

      formations: formIds.map(i => ({
        diploma: document.getElementById(`form-diploma-${i}`).value,
        school: document.getElementById(`form-school-${i}`).value,
        city: document.getElementById(`form-city-${i}`).value,
        date: document.getElementById(`form-date-${i}`).value,
      })),

      projects: projIds.map(i => ({
        name: document.getElementById(`proj-name-${i}`).value,
        description: document.getElementById(`proj-desc-${i}`).value,
        link: document.getElementById(`proj-link-${i}`).value || null,
        technologies: document.getElementById(`proj-tech-${i}`).value
          .split(',').filter(t => t.trim())
          .map(t => ({ name: t.trim() }))
      })),

      languages: langIds.map(i => ({
        language: document.getElementById(`lang-name-${i}`).value,
        level: document.getElementById(`lang-level-${i}`).value,
      })),

      activities: actIds.map(i => ({
        organisation: document.getElementById(`act-org-${i}`).value,
        role: document.getElementById(`act-role-${i}`).value,
        activity_missions: document.getElementById(`act-missions-${i}`).value
          .split('\n').filter(m => m.trim())
          .map(m => ({ description: m.trim() }))
      })),
    };

    fetch('/cv', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cv)
    })
    .then(res => res.json())
    .then(data => {
      const el = document.getElementById('response');
      el.style.display = 'block';
      if (data.message) {
        el.className = 'success';
        el.textContent = `✓ ${data.message} — ${data.total} CV enregistré(s) au total.`;
      } else {
        el.className = 'error';
        el.textContent = 'Erreur : ' + JSON.stringify(data.detail);
      }
    })
    .catch(err => {
      const el = document.getElementById('response');
      el.style.display = 'block';
      el.className = 'error';
      el.textContent = 'Erreur réseau : ' + err;
    });
  }
</script>

</body>
</html>
